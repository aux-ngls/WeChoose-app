<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Qulte Trailer Player</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }

      #player, #empty {
        width: 100%;
        height: 100%;
      }

      #empty {
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        color: rgba(255,255,255,0.86);
        text-align: center;
        line-height: 1.5;
        background:
          radial-gradient(circle at top, rgba(244,114,182,0.18), transparent 42%),
          #050507;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <div id="empty">Bande-annonce indisponible.</div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const rawVideoId = params.get('videoId') || '';
      const videoId = rawVideoId.replace(/[^a-zA-Z0-9_-]/g, '');
      const playerHost = document.getElementById('player');
      const empty = document.getElementById('empty');
      let lastToggleBridgeAt = 0;

      function showEmpty() {
        playerHost.style.display = 'none';
        empty.style.display = 'flex';
      }

      function postBridgeMessage(type) {
        const now = Date.now();
        if (now - lastToggleBridgeAt < 220) {
          return;
        }
        lastToggleBridgeAt = now;

        if (!window.ReactNativeWebView || typeof window.ReactNativeWebView.postMessage !== 'function') {
          return;
        }

        try {
          window.ReactNativeWebView.postMessage(JSON.stringify({ type }));
        } catch (_) {
          // Ignore bridge serialization errors.
        }
      }

      function disableCaptions(player) {
        if (!player) {
          return;
        }

        try {
          if (typeof player.setOption === 'function') {
            player.setOption('captions', 'track', {});
          }
        } catch (_) {
          // Some players reject caption options depending on the trailer.
        }

        try {
          if (typeof player.unloadModule === 'function') {
            player.unloadModule('captions');
          }
        } catch (_) {
          // Ignore unsupported module calls.
        }
      }

      if (!videoId) {
        showEmpty();
      } else {
        document.addEventListener('click', () => {
          postBridgeMessage('toggle-ui');
        });
        document.addEventListener(
          'touchend',
          () => {
            postBridgeMessage('toggle-ui');
          },
          { passive: true },
        );

        window.onYouTubeIframeAPIReady = function onYouTubeIframeAPIReady() {
          new window.YT.Player('player', {
            width: '100%',
            height: '100%',
            videoId,
            host: 'https://www.youtube.com',
            playerVars: {
              autoplay: 1,
              playsinline: 1,
              fs: 0,
              rel: 0,
              cc_load_policy: 0,
              iv_load_policy: 3,
              enablejsapi: 1,
              origin: window.location.origin,
              widget_referrer: window.location.href,
            },
            events: {
              onReady: function onReady(event) {
                disableCaptions(event.target);
                try {
                  event.target.playVideo();
                } catch (_) {
                  // Autoplay can still be denied by the embedded player in some contexts.
                }
              },
              onStateChange: function onStateChange(event) {
                if (event.data === window.YT.PlayerState.PLAYING) {
                  disableCaptions(event.target);
                }
              },
              onError: showEmpty,
            },
          });
        };

        const script = document.createElement('script');
        script.src = 'https://www.youtube.com/iframe_api';
        script.async = true;
        script.onerror = showEmpty;
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
